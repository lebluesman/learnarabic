<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مُفْرَدَاتِي — Mon vocabulaire arabe</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&family=Cairo:wght@400;700&family=Baloo+Bhaijaan+2:wght@400;700&family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4FBF8; --card:#FFFFFF; --ink:#1E2A28;
  --teal:#0E8C7F; --teal-dk:#0A6459; --coral:#FF7A5C; --coral-dk:#D65C40;
  --sun:#FFC145; --line:#DCEEE8; --muted:#6F8985;
}
*{box-sizing:border-box;}
body{ margin:0; background:var(--bg); color:var(--ink); font-family:'Nunito',sans-serif; min-height:100vh; }
.arabic{ font-family:var(--arabic-font, 'Amiri', serif); direction:rtl; }
h1,h2,h3,h4{ font-family:'Baloo 2',sans-serif; margin:0; }
button{ font-family:inherit; cursor:pointer; border:none; background:none; }
#wrap{ max-width:1000px; margin:0 auto; padding:20px 18px 80px; }

.topbar{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
.brand{ display:flex; align-items:center; gap:10px; }
.brand .mark{ font-family:'Amiri',serif; font-size:1.8rem; color:var(--teal-dk); }
.brand h1{ font-size:1.15rem; }
.brand .sub{ font-size:.72rem; color:var(--muted); }
.voice-select{
  display:flex; align-items:center; gap:6px; background:var(--card); border:2px solid var(--line);
  border-radius:999px; padding:6px 12px; font-size:.82rem; font-weight:700; color:var(--teal-dk);
}
.voice-select select{ border:none; background:transparent; font-weight:700; color:var(--teal-dk); font-family:inherit; }
.home-link{
  background:var(--card); border:2px solid var(--line); border-radius:12px; padding:8px 14px;
  font-weight:700; font-size:.85rem; color:var(--muted); text-decoration:none;
}
.home-link:hover{ color:var(--ink); border-color:var(--teal); }

/* ---------- Mobile : header compact ---------- */
@media (max-width:900px), (max-height:850px) {
  #wrap{ padding:12px 10px 76px; }
  .topbar{ gap:8px; margin-bottom:10px; }
  .brand .sub{ display:none; }
  .brand h1{ font-size:1rem; }
  .brand .mark{ font-size:1.4rem; }
  .topbar > div:last-child{ flex-wrap:wrap; gap:6px; }
  .voice-select{ padding:5px 9px; font-size:.72rem; gap:4px; }
  .voice-select select{ font-size:.72rem; }
  .home-link{ padding:6px 10px; font-size:.78rem; }
}

/* ---------- Nav pills (interne à l'appli vocab) ---------- */
.nav-wrap{ margin-bottom:18px; }
.nav-burger{ display:none; }
.nav-pills{
  display:flex; gap:8px; overflow-x:auto; padding-bottom:6px;
  scrollbar-width:none;
}
.nav-pills::-webkit-scrollbar{ display:none; }
.nav-pill{
  flex-shrink:0; padding:9px 16px; border-radius:999px; font-weight:700; font-size:.85rem;
  border:2px solid var(--line); background:var(--card); color:var(--muted); white-space:nowrap;
}
.nav-pill.active{ background:var(--teal); border-color:var(--teal); color:#fff; }
.nav-pill:hover:not(.active){ border-color:var(--sun); color:var(--ink); }

/* Menu de jeux replié en menu burger sur mobile : le bandeau de 6
   pastilles prenait jusqu'à la moitié de l'écran (2-3 lignes une fois
   repliées en flex-wrap), forçant à scroller pour voir le contenu
   (ex: les réponses d'un quiz). Un bouton compact affiche l'écran
   courant ; le menu déroulant s'ouvre en overlay par-dessus le contenu
   (ne pousse rien vers le bas), et se referme après un choix.
   Ce bloc doit rester APRÈS les règles de base ci-dessus (même
   spécificité CSS : l'ordre dans le fichier décide, pas le média). */
@media (max-width:900px), (max-height:850px) {
  .nav-wrap{ position:relative; margin-bottom:12px; }
  .nav-burger{
    display:flex; align-items:center; justify-content:space-between; width:100%;
    background:var(--card); border:2px solid var(--line); border-radius:14px;
    padding:10px 14px; font-weight:700; font-size:.85rem; color:var(--teal-dk);
  }
  .burger-icon{ font-size:1rem; color:var(--muted); }
  .nav-pills{
    display:none; position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:50;
    flex-direction:column; flex-wrap:nowrap; overflow-x:visible;
    background:var(--card); border:2px solid var(--line); border-radius:14px;
    padding:8px; margin-bottom:0; box-shadow:0 10px 24px rgba(0,0,0,.15);
  }
  .nav-pills.open{ display:flex; }
  .nav-pill{ width:100%; text-align:left; padding:10px 14px; font-size:.85rem; }
}

.search-bar{
  display:flex; align-items:center; gap:10px; background:var(--card); border:2px solid var(--line);
  border-radius:16px; padding:12px 16px; margin-bottom:20px;
}
.search-bar input{
  border:none; outline:none; flex:1; font-size:.95rem; font-family:inherit; background:transparent; color:var(--ink);
}

.cat-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:14px; }
.cat-card{
  background:var(--card); border:2px solid var(--line); border-radius:20px; padding:20px 14px; text-align:center;
  box-shadow:0 3px 0 var(--line); transition:transform .12s ease;
}
.cat-card:hover{ transform:translateY(-3px); border-color:var(--teal); }
.cat-card .icon{ font-size:2rem; margin-bottom:8px; }
.cat-icon-img{ width:1.2em; height:1.2em; object-fit:contain; vertical-align:middle; }
.cat-card .icon .cat-icon-img{ width:48px; height:48px; }
.cat-card h3{ font-size:.92rem; margin-bottom:4px; }
.cat-card .count{ font-size:.75rem; color:var(--muted); font-weight:700; }

.back-row{ display:flex; align-items:center; gap:12px; margin-bottom:18px; }
.back-btn{ background:var(--card); border:2px solid var(--line); border-radius:12px; padding:8px 14px; font-weight:700; font-size:.85rem; }
.back-btn:hover{ border-color:var(--teal); }

.word-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(190px,1fr)); gap:16px; }
.word-card{
  background:var(--card); border:2px solid var(--line); border-radius:20px; padding:16px; text-align:center;
  box-shadow:0 3px 0 var(--line);
}
.word-img{
  width:100%; aspect-ratio:4/3; border-radius:14px; background:repeating-linear-gradient(45deg, #EEF7F4, #EEF7F4 10px, #E4F1EC 10px, #E4F1EC 20px);
  border:2px dashed var(--line); display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:var(--muted); font-size:.72rem; font-weight:700; margin-bottom:12px; gap:4px;
}
.word-img .ph-icon{ font-size:1.6rem; opacity:.5; }
.word-ar{ font-size:1.7rem; margin-bottom:4px; }
.word-fr{ font-size:.85rem; color:var(--muted); font-weight:700; margin-bottom:10px; }
.play-word{
  background:var(--teal); color:#fff; border-radius:12px; padding:8px 16px; font-size:.8rem; font-weight:800;
  display:inline-flex; align-items:center; gap:6px;
}
.play-word:hover{ background:var(--teal-dk); }

.empty-msg{ text-align:center; color:var(--muted); padding:40px 0; }

/* ---------- Menu des jeux (accueil) ---------- */
.mode-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
@media(max-width:560px){ .mode-grid{ grid-template-columns:1fr; } }
.mode-card{
  background:var(--card); border:2px solid var(--line); border-radius:20px; padding:22px 20px 20px; text-align:left;
  box-shadow:0 4px 0 var(--line); transition:transform .15s ease, box-shadow .15s ease;
}
.mode-card:hover{ transform:translateY(-3px); box-shadow:0 7px 0 var(--line); border-color:var(--teal); }
.mode-card .icon{
  width:52px; height:52px; display:flex; align-items:center; justify-content:center;
  font-size:1.6rem; margin-bottom:10px; background:var(--bg); border-radius:16px; border:2px solid var(--line);
}
.mode-card h3{ margin:0 0 6px; font-size:1.08rem; }
.mode-card p{ margin:0; color:var(--muted); font-size:.85rem; line-height:1.45; }

/* ---------- Sélecteur de catégorie pour un jeu ---------- */
.scope-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px; }
.scope-card{ background:var(--card); border:2px solid var(--line); border-radius:16px; padding:16px 10px; text-align:center; box-shadow:0 3px 0 var(--line); }
.scope-card:hover{ border-color:var(--teal); transform:translateY(-2px); }
.scope-card .icon{ font-size:1.6rem; margin-bottom:6px; }
.scope-card .icon img{ width:32px; height:32px; object-fit:contain; }
.scope-card h4{ font-size:.8rem; margin:0; }

/* ---------- Quiz (partagé) ---------- */
.quiz-progress{ height:10px; background:var(--line); border-radius:99px; overflow:hidden; margin-bottom:20px; }
.quiz-progress div{ height:100%; background:var(--sun); transition:width .3s ease; }
.quiz-stage{ background:var(--card); border-radius:22px; padding:30px 20px; text-align:center; border:2px solid var(--line); }
.quiz-stage .prompt{ font-weight:700; margin-bottom:16px; color:var(--muted); font-size:.9rem; }
.quiz-img{ width:180px; height:180px; margin:0 auto 18px; border-radius:16px; background:var(--bg); border:2px solid var(--line); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.quiz-img img{ width:100%; height:100%; object-fit:contain; }
.choices{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:6px; }
@media (max-width:900px), (max-height:850px) {
  .quiz-img{ width:130px; height:130px; margin-bottom:12px; }
  .quiz-stage{ padding:20px 14px; }
  .choice-btn{ padding:11px; font-size:1.05rem; }
}
.choice-btn{
  background:var(--bg); border:2px solid var(--line); border-radius:14px; padding:16px; font-size:1.3rem; font-weight:700;
  color:var(--ink);
}
.choice-btn:hover{ border-color:var(--teal); }
.choice-btn.correct{ background:#E1F3EA; border-color:#1F9D6C; color:#0A6459; }
.choice-btn.wrong{ background:#FBE4DF; border-color:var(--coral-dk); color:#8E2E1C; }
.choice-btn.choice-img{ padding:8px; }
.choice-btn.choice-img img{ width:100%; aspect-ratio:1; object-fit:contain; border-radius:10px; }
.quiz-footer{ display:flex; justify-content:space-between; align-items:center; margin-top:20px; flex-wrap:wrap; gap:10px; }
.score-pill{ background:var(--card); border:2px solid var(--line); border-radius:999px; padding:8px 16px; font-weight:800; font-size:.85rem; }

.btn{ background:var(--teal); color:#fff; padding:12px 22px; border-radius:14px; font-weight:700; font-size:.92rem; }
.btn:hover{ background:var(--teal-dk); }
.btn.ghost{ background:var(--card); color:var(--ink); border:2px solid var(--line); }
.btn.ghost:hover{ border-color:var(--teal); }
.btn.gold{ background:var(--sun); color:#4A3400; }
.btn.gold:hover{ filter:brightness(.95); }
.btn:disabled{ opacity:.4; cursor:not-allowed; }

.result-card{ background:var(--card); border-radius:22px; padding:40px 24px; text-align:center; border:2px solid var(--line); }
.result-card .big-score{ font-family:'Baloo 2',sans-serif; font-size:2.8rem; color:var(--teal); margin:6px 0 14px; }

/* ---------- Mémoire ---------- */
.memory-fill{ display:flex; flex-direction:column; }
.memory-meta{ display:flex; gap:16px; font-size:.85rem; font-weight:700; color:var(--muted); margin-bottom:14px; flex-shrink:0; }
.memory-grid{ display:grid; grid-template-columns:repeat(4,1fr); grid-auto-rows:1fr; gap:10px; flex:1; min-height:0; }
/* aspect-ratio:auto (pas de carré fixe) partout : .memory-fill a une hauteur
   calculée en JS (fitMemoryGrid) sur TOUS les appareils, et les cartes
   remplissent l'espace disponible plutôt que d'imposer leur propre taille
   (ce qui forcerait un défilement sur les écrans bas comme un iPad en
   paysage ou un téléphone). */
.memo-card{
  aspect-ratio:auto; background:var(--teal); border-radius:14px; display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:1.6rem; text-align:center; padding:6px; border:2px solid var(--teal-dk);
}
@media (max-width:900px), (max-height:850px) {
  .memo-card{ font-size:1.3rem; }
  .memory-grid{ gap:7px; }
}
.memo-card.hidden-face{ background:var(--card); color:transparent; border-color:var(--line); }
.memo-card.matched{ background:#E1F3EA; border-color:#1F9D6C; opacity:.55; }
.memo-card img{ width:75%; height:75%; object-fit:contain; }
.memo-card .word-txt{ font-size:1.05rem; }

/* ---------- Défi chrono ---------- */
.streak-badge{
  background:var(--sun); color:#4A3400; border-radius:999px; padding:8px 16px; font-weight:800; font-size:.88rem;
  display:inline-block; margin-bottom:12px;
}
.chrono-bar{ height:10px; background:var(--line); border-radius:99px; overflow:hidden; margin-bottom:20px; }
.chrono-bar div{ height:100%; background:var(--coral); }

#toast-wrap{ position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:999; display:flex; flex-direction:column; gap:8px; }
.toast{ background:var(--ink); color:#fff; padding:10px 18px; border-radius:999px; font-size:.85rem; font-weight:700; }
</style>
</head>
<body>
<div id="toast-wrap"></div>
<div id="wrap"></div>

<script>
/* ======================= ÉTAT ======================= */
let VOCAB = { categories: [] };
let screen = 'menu'; // 'menu' | 'apprendre' | 'category' | 'scopePicker' | 'quizImage' | 'quizAudio' | 'quizResult' | 'memory' | 'chrono'
let navMenuOpen = false; // menu burger (mobile) : replié par défaut
let currentCat = null;
let searchTerm = '';
let pendingGame = null;
let quiz = null;
let memory = null;
let chrono = null;

/* ======================= AUDIO (dossier séparé des lettres : mots1..mots5) ======================= */
const VOICE_KEY = 'huruf_voice_dir_mots';
const VOICE_OPTIONS = ['mots1','mots2','mots3','mots4','mots5'];
function getVoiceDir(){
  const saved = localStorage.getItem(VOICE_KEY);
  return VOICE_OPTIONS.includes(saved) ? saved : 'mots1';
}
let AUDIO_MANIFEST = {};
function loadManifest(){
  return fetch(getVoiceDir() + '/manifest.json').then(r=>r.ok?r.json():{}).then(m=>{AUDIO_MANIFEST=m;}).catch(()=>{AUDIO_MANIFEST={};});
}
function setVoiceDir(dir){
  localStorage.setItem(VOICE_KEY, dir);
  loadManifest().then(()=>{ toast('🎙️ Voix changée : ' + dir.replace('mots','Voix ')); });
}

/* ======================= POLICE ARABE (web font, aucune installation requise) ======================= */
const FONT_KEY = 'huruf_arabic_font';
const FONT_OPTIONS = [
  {id:'amiri', label:'Amiri (classique)', family:"'Amiri', serif"},
  {id:'noto', label:'Noto Naskh (claire)', family:"'Noto Naskh Arabic', serif"},
  {id:'cairo', label:'Cairo (moderne)', family:"'Cairo', sans-serif"},
  {id:'baloo', label:'Baloo (ludique)', family:"'Baloo Bhaijaan 2', cursive"},
];
function getFontId(){
  const saved = localStorage.getItem(FONT_KEY);
  return FONT_OPTIONS.some(f=>f.id===saved) ? saved : 'baloo';
}
function applyFont(id){
  const f = FONT_OPTIONS.find(x=>x.id===id) || FONT_OPTIONS[0];
  document.documentElement.style.setProperty('--arabic-font', f.family);
}
function setFontId(id){
  localStorage.setItem(FONT_KEY, id);
  applyFont(id);
  toast('🔤 Police changée : ' + FONT_OPTIONS.find(f=>f.id===id).label);
}

function toast(msg, ms){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className='toast'; el.textContent=msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), ms||2600);
}

function speakBrowser(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ar-SA'; u.rate = 0.8;
  speechSynthesis.speak(u);
}
function speakOnline(text){
  try{
    const url = 'https://translate.google.com/translate_tts?ie=UTF-8&q=' + encodeURIComponent(text) + '&tl=ar&client=tw-ob';
    const audio = new Audio(url);
    audio.play().catch(()=> speakBrowser(text));
  }catch(e){ speakBrowser(text); }
}
function speak(text){
  const filename = AUDIO_MANIFEST[text];
  if(filename){
    const audio = new Audio(getVoiceDir() + '/' + filename);
    audio.play().catch(()=> speakOnline(text));
    return;
  }
  speakOnline(text);
}

/* ======================= UTILITAIRES ======================= */
function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }
function pick(arr, n){ return shuffle(arr).slice(0, Math.max(0, n)); }
function scrollTop(){ window.scrollTo({top:0, behavior:'smooth'}); }

function allWordsFlat(){
  const out = [];
  VOCAB.categories.forEach(cat=>{
    cat.words.forEach(w=>{ if(w.img) out.push({...w, catId:cat.id, catLabel:cat.label}); });
  });
  return out;
}
function wordsForScope(scopeId){
  if(scopeId==='all') return allWordsFlat();
  const cat = VOCAB.categories.find(c=>c.id===scopeId);
  return cat ? cat.words.filter(w=>w.img).map(w=>({...w, catId:cat.id, catLabel:cat.label})) : [];
}

/* ======================= NAVIGATION ======================= */
function goMenu(){ if(chrono) clearInterval(chrono.timer); screen='menu'; render(); scrollTop(); }
function goApprendre(){ screen='apprendre'; currentCat=null; searchTerm=''; render(); scrollTop(); }
function openCategory(catId){ currentCat = catId; screen='category'; render(); scrollTop(); }
function onSearch(v){
  searchTerm = v;
  render();
  const input = document.getElementById('searchInput');
  if(input){
    input.focus();
    input.setSelectionRange(v.length, v.length);
  }
}

function pickScope(gameId){ pendingGame = gameId; screen='scopePicker'; render(); scrollTop(); }
function chooseScope(scopeId){
  const scope = wordsForScope(scopeId);
  const cat = VOCAB.categories.find(c=>c.id===scopeId);
  const label = scopeId==='all' ? 'Toutes les catégories' : (cat ? cat.label : scopeId);
  if(pendingGame==='quizImage') startQuizImage(scope, label);
  else if(pendingGame==='quizAudio') startQuizAudio(scope, label);
  else if(pendingGame==='memory') startMemory(scope, label);
  else if(pendingGame==='chrono') startChrono(scope, label, scopeId);
}

/* ======================= RENDU ======================= */
function render(){
  const wrap = document.getElementById('wrap');
  wrap.innerHTML = topbar() + navPills() + body();
  if(screen==='memory') fitMemoryGrid();
}

/* Force le jeu de mémoire à toujours tenir dans l'écran visible (pas de
   scroll pour voir toutes les cartes), en calculant la hauteur restante
   après le header/nav — quel que soit l'appareil ou l'orientation
   (téléphone, iPad portrait/paysage, desktop...). */
function fitMemoryGrid(){
  const el = document.querySelector('.memory-fill');
  if(!el) return;
  const top = el.getBoundingClientRect().top;
  const wrapBottomPad = 76; /* doit matcher le padding-bottom de #wrap en mobile */
  const available = window.innerHeight - top - wrapBottomPad;
  el.style.height = Math.max(240, available) + 'px';
}
window.addEventListener('resize', ()=>{ if(screen==='memory') fitMemoryGrid(); });

function body(){
  switch(screen){
    case 'menu': return `<div>${renderMenu()}</div>`;
    case 'apprendre': return `<div>${renderApprendre()}</div>`;
    case 'category': return `<div>${renderCategory()}</div>`;
    case 'scopePicker': return `<div>${renderScopePicker()}</div>`;
    case 'quizImage': return `<div>${screenQuizImage()}</div>`;
    case 'quizAudio': return `<div>${screenQuizAudio()}</div>`;
    case 'quizResult': return `<div>${screenQuizResult()}</div>`;
    case 'memory': return `<div>${screenMemory()}</div>`;
    case 'chrono': return `<div>${screenChrono()}</div>`;
    default: return '';
  }
}

function topbar(){
  return `
  <div class="topbar">
    <div class="brand">
      <span class="mark">م</span>
      <div><h1>مُفْرَدَاتِي</h1><div class="sub">Mon vocabulaire arabe</div></div>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <label class="voice-select">
        🎙️
        <select onchange="setVoiceDir(this.value)">
          ${VOICE_OPTIONS.map((v,i)=>`<option value="${v}" ${getVoiceDir()===v?'selected':''}>Voix ${i+1}</option>`).join('')}
        </select>
      </label>
      <label class="voice-select">
        🔤
        <select onchange="setFontId(this.value)">
          ${FONT_OPTIONS.map(f=>`<option value="${f.id}" ${getFontId()===f.id?'selected':''}>${f.label}</option>`).join('')}
        </select>
      </label>
      <a class="home-link" href="index.html">Menu</a>
    </div>
  </div>
  `;
}

function toggleNavMenu(){ navMenuOpen = !navMenuOpen; render(); }

function navPills(){
  const isGame = ['quizImage','quizAudio','quizResult','memory','chrono','scopePicker'].includes(screen);
  const gameActive = isGame && pendingGame ? pendingGame : (quiz && (screen==='quizImage'||screen==='quizAudio'||screen==='quizResult') ? quiz.mode : (screen==='memory'?'memory':(screen==='chrono'?'chrono':null)));
  const pills = [
    { label:'🏠 Accueil', active: screen==='menu', action:"goMenu()" },
    { label:'📖 Apprendre', active: (screen==='apprendre'||screen==='category'), action:"goApprendre()" },
    { label:'🖼️ Devine le mot', active: gameActive==='quizImage', action:"pickScope('quizImage')" },
    { label:'👂 Écoute', active: gameActive==='quizAudio', action:"pickScope('quizAudio')" },
    { label:'🧠 Mémoire', active: gameActive==='memory', action:"pickScope('memory')" },
    { label:'⚡ Chrono', active: gameActive==='chrono', action:"pickScope('chrono')" },
  ];
  const current = pills.find(p=>p.active) || pills[0];
  return `
  <div class="nav-wrap">
    <button class="nav-burger" onclick="toggleNavMenu()">
      <span>${current.label}</span>
      <span class="burger-icon">${navMenuOpen?'✕':'☰'}</span>
    </button>
    <div class="nav-pills ${navMenuOpen?'open':''}">
      ${pills.map(p=>`<button class="nav-pill ${p.active?'active':''}" onclick="navMenuOpen=false; ${p.action}">${p.label}</button>`).join('')}
    </div>
  </div>
  `;
}

/* ---------- Accueil : menu des jeux ---------- */
function renderMenu(){
  return `
  <div class="mode-grid">
    <div class="mode-card" onclick="goApprendre()" style="cursor:pointer;">
      <div class="icon">📖</div>
      <h3>Apprendre</h3>
      <p>Explore les 18 catégories, regarde les images et écoute la prononciation de chaque mot.</p>
    </div>
    <div class="mode-card" onclick="pickScope('quizImage')" style="cursor:pointer;">
      <div class="icon">🖼️</div>
      <h3>Devine le mot</h3>
      <p>Une image s'affiche : retrouve le bon mot arabe parmi 4 choix.</p>
    </div>
    <div class="mode-card" onclick="pickScope('quizAudio')" style="cursor:pointer;">
      <div class="icon">👂</div>
      <h3>Quiz à l'écoute</h3>
      <p>Écoute le mot, puis touche la bonne image parmi 4 propositions. Entraîne ton oreille !</p>
    </div>
    <div class="mode-card" onclick="pickScope('memory')" style="cursor:pointer;">
      <div class="icon">🧠</div>
      <h3>Mémoire</h3>
      <p>Retrouve les paires image / mot arabe dans ce jeu de mémoire classique.</p>
    </div>
    <div class="mode-card" onclick="pickScope('chrono')" style="cursor:pointer;">
      <div class="icon">⚡</div>
      <h3>Défi chrono</h3>
      <p>Réponds le plus vite possible, enchaîne les bonnes réponses avant la fin du temps, et bats ton record !</p>
    </div>
  </div>
  `;
}

/* ---------- Apprendre (parcourir / rechercher) ---------- */
function renderApprendre(){
  const term = searchTerm.trim().toLowerCase();
  let matches = [];
  if(term){
    VOCAB.categories.forEach(cat=>{
      cat.words.forEach(w=>{
        if(w.fr.toLowerCase().includes(term) || w.ar.includes(term)){
          matches.push({...w, catLabel:cat.label, catIcon:catIconHtml(cat)});
        }
      });
    });
  }
  return `
  <div class="search-bar">
    🔍 <input id="searchInput" type="text" placeholder="Chercher un mot en français..." value="${escAttr(searchTerm)}" oninput="onSearch(this.value)">
  </div>
  ${term ? renderSearchResults(matches) : renderCatGrid()}
  `;
}

function renderCatGrid(){
  return `
  <div class="cat-grid">
    ${VOCAB.categories.map(cat=>`
      <button class="cat-card" onclick="openCategory('${cat.id}')">
        <div class="icon">${catIconHtml(cat)}</div>
        <h3>${cat.label}</h3>
        <div class="count">${cat.words.length} mots</div>
      </button>
    `).join('')}
  </div>
  `;
}

function renderSearchResults(matches){
  if(matches.length===0) return `<div class="empty-msg">Aucun mot trouvé pour « ${escHtml(searchTerm)} ».</div>`;
  return `
  <p style="color:var(--muted); font-size:.85rem; margin-bottom:14px;">${matches.length} résultat(s)</p>
  <div class="word-grid">${matches.map(w=>wordCard(w, `${w.catIcon} ${w.catLabel}`)).join('')}</div>
  `;
}

function renderCategory(){
  const cat = VOCAB.categories.find(c=>c.id===currentCat);
  if(!cat) return `<div class="empty-msg">Catégorie introuvable.</div>`;
  return `
  <div class="back-row">
    <button class="back-btn" onclick="goApprendre()">← Toutes les catégories</button>
    <h2 style="font-size:1.1rem; display:flex; align-items:center; gap:8px;">${cat.img ? `<img src="${escAttr(cat.img)}" alt="" style="width:28px; height:28px; object-fit:contain; vertical-align:middle;">` : cat.icon} ${cat.label} <span style="color:var(--muted); font-weight:600; font-size:.8rem;">(${cat.words.length} mots)</span></h2>
  </div>
  <div class="word-grid">${cat.words.map(w=>wordCard(w)).join('')}</div>
  `;
}

function wordCard(w, badge){
  return `
  <div class="word-card">
    ${badge ? `<div style="font-size:.7rem; color:var(--muted); font-weight:800; margin-bottom:8px;">${badge}</div>` : ''}
    ${imageBlock(w)}
    <div class="word-ar arabic">${w.ar}</div>
    <div class="word-fr">${escHtml(w.fr)}</div>
    <button class="play-word" onclick="speak('${escAttr(w.ar)}')">🔊 Écouter</button>
  </div>
  `;
}

function imageBlock(w){
  if(w.img){
    return `<div class="word-img" style="border-style:solid; background:var(--card);"><img src="${escAttr(w.img)}" alt="${escAttr(w.fr)}" style="width:100%; height:100%; object-fit:contain; border-radius:12px;"></div>`;
  }
  if(w.emoji){
    return `<div class="word-img" style="border-style:solid; background:#F0F9F6; font-size:2.6rem;">${w.emoji}</div>`;
  }
  return `<div class="word-img"><span class="ph-icon">🖼️</span><span>Image à venir</span></div>`;
}

function catIconHtml(cat){
  if(cat.img) return `<img class="cat-icon-img" src="${escAttr(cat.img)}" alt="${escAttr(cat.label)}">`;
  return cat.icon;
}

/* ---------- Sélecteur de catégorie pour un jeu ---------- */
function renderScopePicker(){
  const titles = {quizImage:'🖼️ Devine le mot', quizAudio:"👂 Quiz à l'écoute", memory:'🧠 Mémoire', chrono:'⚡ Défi chrono'};
  return `
  <div class="back-row"><button class="back-btn" onclick="goMenu()">← Menu des jeux</button></div>
  <h2 style="margin:0 0 14px;">${titles[pendingGame]||''} — choisis une catégorie</h2>
  <div class="scope-grid">
    <button class="scope-card" onclick="chooseScope('all')">
      <div class="icon">🎲</div>
      <h4>Toutes les catégories</h4>
    </button>
    ${VOCAB.categories.map(cat=>`
      <button class="scope-card" onclick="chooseScope('${cat.id}')">
        <div class="icon">${catIconHtml(cat)}</div>
        <h4>${escHtml(cat.label)}</h4>
      </button>
    `).join('')}
  </div>
  `;
}

/* ======================= JEU : Devine le mot (image → texte) ======================= */
function startQuizImage(scope, label){
  const n = Math.min(8, scope.length);
  const chosen = pick(scope, n);
  const questions = chosen.map(w=>{
    const distractors = pick(scope.filter(x=>x!==w), Math.min(3, Math.max(0, scope.length-1))).map(x=>x.ar);
    const choices = shuffle([w.ar, ...distractors]);
    return {img:w.img, answer:w.ar, choices};
  });
  quiz = {mode:'quizImage', label, questions, i:0, score:0, answered:false};
  screen='quizImage'; render(); scrollTop();
}
function screenQuizImage(){
  const q = quiz.questions[quiz.i];
  return `
  ${quizHeader('🖼️ Devine le mot')}
  <div class="quiz-stage">
    <div class="prompt">Quel est ce mot en arabe ?</div>
    <div class="quiz-img"><img src="${escAttr(q.img)}" alt=""></div>
    <div class="choices">
      ${q.choices.map(c=>{
        let cls='choice-btn';
        if(quiz.answered){
          if(c===q.answer) cls+=' correct';
          else if(c===quiz.answered) cls+=' wrong';
        }
        return `<button class="${cls}" ${quiz.answered?'disabled':''} onclick="answerQuiz('${escAttr(c)}')"><span class="arabic">${c}</span></button>`;
      }).join('')}
    </div>
  </div>
  ${quizFooter()}
  `;
}

/* ======================= JEU : Quiz à l'écoute (son → image) ======================= */
function startQuizAudio(scope, label){
  const n = Math.min(8, scope.length);
  const chosen = pick(scope, n);
  const questions = chosen.map(w=>{
    const distractors = pick(scope.filter(x=>x!==w), Math.min(3, Math.max(0, scope.length-1)));
    const choiceWords = shuffle([w, ...distractors]);
    return {ar:w.ar, answerImg:w.img, choices:choiceWords.map(c=>({img:c.img, isAnswer:c===w}))};
  });
  quiz = {mode:'quizAudio', label, questions, i:0, score:0, answered:false};
  screen='quizAudio'; render(); scrollTop();
  setTimeout(()=> speak(questions[0].ar), 400);
}
function replayQuizAudio(){ speak(quiz.questions[quiz.i].ar); }
function screenQuizAudio(){
  const q = quiz.questions[quiz.i];
  return `
  ${quizHeader("👂 Quiz à l'écoute")}
  <div class="quiz-stage">
    <div class="prompt">Écoute le mot, puis touche la bonne image</div>
    <button class="btn gold" onclick="replayQuizAudio()" style="margin-bottom:20px;">🔊 Réécouter</button>
    <div class="choices">
      ${q.choices.map(c=>{
        let cls='choice-btn choice-img';
        if(quiz.answered){
          if(c.isAnswer) cls+=' correct';
          else if(c.img===quiz.answered) cls+=' wrong';
        }
        return `<button class="${cls}" ${quiz.answered?'disabled':''} onclick="answerQuiz('${escAttr(c.img)}')"><img src="${escAttr(c.img)}" alt=""></button>`;
      }).join('')}
    </div>
  </div>
  ${quizFooter()}
  `;
}

/* ---------- Logique quiz partagée ---------- */
function quizHeader(title){
  return `
  <div class="back-row"><button class="back-btn" onclick="goMenu()">← Menu des jeux</button></div>
  <h2 style="margin:6px 0 14px;">${title} <span style="color:var(--muted); font-weight:600; font-size:.75rem;">— ${escHtml(quiz.label)}</span></h2>
  <div class="quiz-progress"><div style="width:${(quiz.i/quiz.questions.length)*100}%"></div></div>
  `;
}
function quizFooter(){
  return `
  <div class="quiz-footer">
    <div class="score-pill">Score : ${quiz.score}/${quiz.questions.length}</div>
    <button class="btn" ${quiz.answered?'':'disabled'} onclick="nextQuiz()">${quiz.i<quiz.questions.length-1?'Suivant →':'Voir mon résultat →'}</button>
  </div>
  `;
}
function answerQuiz(choiceValue){
  if(quiz.answered) return;
  quiz.answered = choiceValue;
  const q = quiz.questions[quiz.i];
  const correct = quiz.mode==='quizImage' ? (choiceValue===q.answer) : (choiceValue===q.answerImg);
  if(correct) quiz.score++;
  render();
}
function nextQuiz(){
  if(quiz.i < quiz.questions.length-1){
    quiz.i++; quiz.answered=false; render();
    if(quiz.mode==='quizAudio') setTimeout(()=> speak(quiz.questions[quiz.i].ar), 350);
  } else {
    screen='quizResult'; render();
  }
  scrollTop();
}
function screenQuizResult(){
  const pct = Math.round((quiz.score/quiz.questions.length)*100);
  const msg = pct>=80 ? 'Excellent ! ما شاء الله' : pct>=50 ? 'Bien joué, continue à t’entraîner !' : 'Bon début — réessaie pour progresser !';
  return `
  <div class="result-card">
    <div style="font-size:2.2rem;">${pct>=80?'🏆':pct>=50?'⭐':'🌱'}</div>
    <div class="big-score">${quiz.score}/${quiz.questions.length}</div>
    <p style="color:var(--muted);">${msg}</p>
    <div style="display:flex; gap:12px; justify-content:center; margin-top:20px; flex-wrap:wrap;">
      <button class="btn gold" onclick="pickScope('${quiz.mode}')">🔁 Rejouer</button>
      <button class="btn ghost" onclick="goMenu()">🏠 Menu des jeux</button>
    </div>
  </div>
  `;
}

/* ======================= JEU : Mémoire ======================= */
function startMemory(scope, label){
  const n = Math.min(8, scope.length);
  const chosen = pick(scope, n);
  let cards = [];
  chosen.forEach((w,idx)=>{
    cards.push({pairId:idx, kind:'image', img:w.img, speakTxt:w.ar});
    cards.push({pairId:idx, kind:'word', txt:w.ar, speakTxt:w.ar});
  });
  cards = shuffle(cards).map((c,i)=>({...c, cardId:i, flipped:false, matched:false}));
  memory = {label, cards, flippedIds:[], moves:0, matches:0, total:chosen.length, lock:false};
  screen='memory'; render(); scrollTop();
}
function flipMemoryCard(cardId){
  const m = memory;
  if(m.lock) return;
  const card = m.cards.find(c=>c.cardId===cardId);
  if(!card || card.flipped || card.matched) return;
  card.flipped = true;
  speak(card.speakTxt);
  m.flippedIds.push(cardId);
  if(m.flippedIds.length===2){
    m.moves++;
    const [a,b] = m.flippedIds.map(id=>m.cards.find(c=>c.cardId===id));
    if(a.pairId===b.pairId){
      a.matched=true; b.matched=true; m.matches++;
      m.flippedIds=[];
    } else {
      m.lock=true;
      setTimeout(()=>{ a.flipped=false; b.flipped=false; m.flippedIds=[]; m.lock=false; render(); }, 800);
    }
  }
  render();
}
function screenMemory(){
  const m = memory;
  const done = m.matches === m.total;
  return `
  <div class="back-row"><button class="back-btn" onclick="goMenu()">← Menu des jeux</button></div>
  <div class="memory-fill">
    <h2 style="margin:0 0 6px; flex-shrink:0;">🧠 Mémoire <span style="color:var(--muted); font-weight:600; font-size:.75rem;">— ${escHtml(m.label)}</span></h2>
    <div class="memory-meta"><span>Coups : ${m.moves}</span><span>Paires trouvées : ${m.matches}/${m.total}</span></div>
    <div class="memory-grid">
      ${m.cards.map(c=>{
        const show = c.flipped || c.matched;
        const cls = `memo-card ${!show?'hidden-face':''} ${c.matched?'matched':''}`;
        let inner = '';
        if(show){
          inner = c.kind==='image' ? `<img src="${escAttr(c.img)}" alt="">` : `<span class="arabic word-txt">${c.txt}</span>`;
        }
        return `<button class="${cls}" onclick="flipMemoryCard(${c.cardId})">${inner}</button>`;
      }).join('')}
    </div>
  </div>
  ${done ? `
  <div class="result-card" style="margin-top:24px;">
    <div style="font-size:2.2rem;">🎉</div>
    <p style="color:var(--muted);">Bravo, toutes les paires trouvées en ${m.moves} coups !</p>
    <div style="display:flex; gap:12px; justify-content:center; margin-top:16px; flex-wrap:wrap;">
      <button class="btn gold" onclick="pickScope('memory')">🔁 Nouvelle partie</button>
      <button class="btn ghost" onclick="goMenu()">🏠 Menu des jeux</button>
    </div>
  </div>` : ''}
  `;
}

/* ======================= JEU : Défi chrono ======================= */
const CHRONO_TIME = 6000;
function startChrono(scope, label, scopeId){
  chrono = {label, scope, scopeId, streak:0, best:Number(localStorage.getItem('huruf_chrono_best_'+scopeId) || 0), current:null, deadline:0, timer:null, answered:false, over:false};
  screen='chrono';
  nextChronoQuestion();
}
function nextChronoQuestion(){
  const scope = chrono.scope;
  const w = scope[Math.floor(Math.random()*scope.length)];
  const distractors = pick(scope.filter(x=>x!==w), Math.min(2, Math.max(0, scope.length-1)));
  const choices = shuffle([w, ...distractors]);
  chrono.current = {answer:w, choices};
  chrono.deadline = Date.now() + CHRONO_TIME;
  chrono.answered = false;
  clearInterval(chrono.timer);
  chrono.timer = setInterval(chronoTick, 80);
  render();
  scrollTop();
}
function chronoTick(){
  if(!chrono || chrono.over) return;
  const remain = chrono.deadline - Date.now();
  if(remain <= 0){
    clearInterval(chrono.timer);
    endChrono();
    return;
  }
  const bar = document.getElementById('chrono-bar-fill');
  if(bar) bar.style.width = Math.max(0,(remain/CHRONO_TIME)*100) + '%';
}
function answerChrono(idx){
  if(!chrono || chrono.answered || chrono.over) return;
  chrono.answered = true;
  clearInterval(chrono.timer);
  const picked = chrono.current.choices[idx];
  if(picked === chrono.current.answer){
    chrono.streak++;
    setTimeout(()=>{ if(chrono && !chrono.over) nextChronoQuestion(); }, 260);
  } else {
    endChrono();
  }
}
function endChrono(){
  chrono.over = true;
  clearInterval(chrono.timer);
  if(chrono.streak > chrono.best){
    chrono.best = chrono.streak;
    localStorage.setItem('huruf_chrono_best_'+chrono.scopeId, String(chrono.best));
  }
  render();
}
function stopChronoAndGoMenu(){ if(chrono) clearInterval(chrono.timer); goMenu(); }
function screenChrono(){
  const c = chrono;
  if(c.over){
    return `
    <div class="result-card">
      <div style="font-size:2.2rem;">⚡</div>
      <div class="big-score">${c.streak}</div>
      <p style="color:var(--muted);">mot(s) d'affilée trouvés — ${escHtml(c.label)}<br>Meilleur score : ${c.best}</p>
      <div style="display:flex; gap:12px; justify-content:center; margin-top:20px; flex-wrap:wrap;">
        <button class="btn gold" onclick="chooseScope('${c.scopeId}')">🔁 Rejouer</button>
        <button class="btn ghost" onclick="goMenu()">🏠 Menu des jeux</button>
      </div>
    </div>`;
  }
  return `
  <div class="back-row"><button class="back-btn" onclick="stopChronoAndGoMenu()">← Menu des jeux</button></div>
  <h2 style="margin:0 0 6px;">⚡ Défi chrono <span style="color:var(--muted); font-weight:600; font-size:.75rem;">— ${escHtml(c.label)}</span></h2>
  <div class="streak-badge">🔥 Série : ${c.streak} — Record : ${c.best}</div>
  <div class="chrono-bar"><div id="chrono-bar-fill" style="width:100%"></div></div>
  <div class="quiz-stage">
    <div class="prompt">Vite ! Quel est ce mot ?</div>
    <div class="quiz-img"><img src="${escAttr(c.current.answer.img)}" alt=""></div>
    <div class="choices">
      ${c.current.choices.map((w,idx)=>`<button class="choice-btn" onclick="answerChrono(${idx})"><span class="arabic">${w.ar}</span></button>`).join('')}
    </div>
  </div>
  `;
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return escHtml(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

/* ======================= DÉMARRAGE ======================= */
async function init(){
  applyFont(getFontId());
  loadManifest();
  try{
    const r = await fetch('vocabulaire_data.json');
    VOCAB = await r.json();
  }catch(e){
    document.getElementById('wrap').innerHTML = topbar() + `<div class="empty-msg">⚠️ Impossible de charger vocabulaire_data.json.<br>Assure-toi de lancer cette page via un serveur local (ex: <code>python3 -m http.server</code>), pas en double-cliquant le fichier.</div>`;
    return;
  }
  render();
}
init();
</script>
